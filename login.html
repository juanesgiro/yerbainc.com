<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Yerba Inc.</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green-dark: #1a2e1a;
      --green-mid: #2d4a2d;
      --green-light: #4a7c4a;
      --cream: #f5f0e8;
      --gold: #c9a84c;
      --text: #2c2c2c;
      --text-light: #6b6b6b;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--green-dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: var(--cream);
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      margin: 2rem;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-brand h1 {
      font-size: 2rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--green-dark);
      font-style: italic;
    }

    .login-brand h1 span {
      color: var(--gold);
    }

    .login-brand p {
      font-size: 0.75rem;
      color: var(--text-light);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    .login-form label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--green-dark);
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    .login-form input {
      width: 100%;
      padding: 0.8rem 1rem;
      margin-bottom: 1.2rem;
      border: 2px solid rgba(26, 46, 26, 0.15);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.3s;
    }

    .login-form input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .login-form button {
      width: 100%;
      padding: 0.9rem;
      background: var(--green-dark);
      color: var(--cream);
      border: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.3s;
    }

    .login-form button:hover {
      background: var(--green-mid);
    }

    .login-error {
      background: #fde8e8;
      color: #c53030;
      padding: 0.7rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: var(--green-dark);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-brand">
      <h1>Yerba <span>Inc.</span></h1>
      <p>Admin Panel</p>
    </div>

    <div class="login-error" id="loginError">Usuario o contrase&ntilde;a incorrectos.</div>

    <form class="login-form" id="loginForm">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">

      <label for="password">Contrase&ntilde;a</label>
      <input type="password" id="password" placeholder="Ingresa tu contrase&ntilde;a" required autocomplete="current-password">

      <button type="submit">Iniciar Sesi&oacute;n</button>
    </form>

    <a href="index.html" class="back-link">&larr; Volver al sitio</a>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('yerba_admin_session')) {
      window.location.href = 'admin.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var user = document.getElementById('username').value.trim();
      var pass = document.getElementById('password').value;

      if (user === 'admin' && pass === 'yerba2026') {
        localStorage.setItem('yerba_admin_session', JSON.stringify({
          user: 'admin',
          loginTime: new Date().toISOString()
        }));
        window.location.href = 'admin.html';
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    });
  </script>

</body>
</html>
