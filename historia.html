<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario | Yerba Inc.</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green-dark: #1a2e1a; --green-mid: #2d4a2d; --green-light: #4a7c4a;
      --cream: #f5f0e8; --gold: #c9a84c; --text: #2c2c2c; --text-light: #6b6b6b;
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: var(--text); background: var(--cream); line-height: 1.6; }
    nav { background: var(--green-dark); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--cream); letter-spacing: 2px; text-transform: uppercase; }
    .logo span { color: var(--gold); }
    .nav-logo-img { height: 45px; filter: drop-shadow(0 0 6px rgba(201,168,76,0.4)); transition: filter 0.3s, transform 0.3s; }
    .nav-logo-img:hover { filter: drop-shadow(0 0 12px rgba(201,168,76,0.7)); transform: scale(1.05); }
    .nav-brand { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; }
    .nav-brand .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
    .nav-brand .brand-name { font-size: 1.4rem; font-weight: 800; color: var(--cream); letter-spacing: 3px; text-transform: uppercase; font-style: italic; }
    .nav-brand .brand-name em { color: var(--gold); font-style: normal; }
    .nav-brand .brand-sub { font-size: 0.55rem; color: rgba(245,240,232,0.5); letter-spacing: 4px; text-transform: uppercase; }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav a { color: var(--cream); text-decoration: none; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s; }
    nav a:hover { color: var(--gold); }
    .page-hero { background: linear-gradient(rgba(26,46,26,0.8), rgba(26,46,26,0.85)), url('fotos/IMG_20260312_235554554_HDR.jpg') center/cover no-repeat; color: var(--cream); text-align: center; padding: 6rem 2rem; }
    .page-hero h1 { font-size: 3rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 0.5rem; }
    .page-hero h1 span { color: var(--gold); }
    .page-hero p { color: rgba(245,240,232,0.7); letter-spacing: 2px; text-transform: uppercase; }

    /* Filter Bar */
    .filter-bar { max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 0; display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center; }
    .filter-pill { padding: 0.5rem 1.2rem; border: 2px solid var(--green-dark); background: none; color: var(--green-dark); border-radius: 50px; font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; font-family: inherit; }
    .filter-pill:hover { background: var(--green-mid); color: var(--cream); border-color: var(--green-mid); }
    .filter-pill.active { background: var(--green-dark); color: var(--gold); border-color: var(--green-dark); }

    /* Product Grid */
    .inventory-grid { max-width: 1100px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
    .product-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: transform 0.3s, box-shadow 0.3s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .product-card img { width: 100%; height: 220px; object-fit: cover; transition: transform 0.4s; }
    .product-card:hover img { transform: scale(1.05); }
    .product-card .img-wrap { overflow: hidden; background: var(--green-mid); }
    .product-card .info { padding: 1.2rem 1.5rem; }
    .product-card .info h3 { font-size: 1.1rem; color: var(--green-dark); margin-bottom: 0.3rem; }
    .product-card .info .cat { font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .product-card .info .price { font-weight: 700; color: var(--gold); font-size: 1.15rem; }
    .no-products { text-align: center; padding: 4rem 2rem; color: var(--text-light); font-size: 1.1rem; grid-column: 1 / -1; }

    footer { background: #111; color: rgba(245,240,232,0.4); text-align: center; padding: 2rem; font-size: 0.8rem; letter-spacing: 1px; }
    @media (max-width: 768px) { nav ul { display: none; } .inventory-grid { grid-template-columns: 1fr; } }
    @media (min-width: 769px) and (max-width: 1024px) { .inventory-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-brand">
      <img src="fotos/IMG-20260312-WA0016.jpg" alt="Yerba Inc." class="nav-logo-img">
      <div class="brand-text">
        <span class="brand-name">Yerba <em>Inc.</em></span>
        <span class="brand-sub">Premium Smoke Shop</span>
      </div>
    </a>
    <ul>
      <li><a href="index.html#products">Shop</a></li>
      <li><a href="historia.html">Inventario</a></li>
      <li><a href="galeria.html">Galería</a></li>
      <li><a href="promociones.html">Promociones</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#contact">Contact</a></li>
      <li><a href="https://instagram.com" target="_blank">Instagram</a></li>
    </ul>
  </nav>

  <div class="page-hero">
    <h1>Nuestro <span>Inventario</span></h1>
    <p>Explora nuestra colección completa de productos</p>
  </div>

  <div class="filter-bar" id="filterBar"></div>
  <div class="inventory-grid" id="inventoryGrid"></div>

  <footer>
    &copy; 2026 Yerba Inc. &mdash; All Rights Reserved &mdash; Must be 18+ to purchase
  </footer>

  <script>
    var DEFAULT_PRODUCTS = [
      { id: 1, name: 'Pipa Clásica', category: 'Pipas', price: 25, stock: 30, image: 'fotos/IMG_20260312_235554554_HDR.jpg' },
      { id: 2, name: 'Pipa de Madera', category: 'Pipas', price: 35, stock: 20, image: 'fotos/IMG_20260312_235554554_HDR.jpg' },
      { id: 3, name: 'Bong de Vidrio', category: 'Bongs', price: 60, stock: 15, image: 'fotos/IMG_20260312_235557154_HDR.jpg' },
      { id: 4, name: 'Bong Acrílico', category: 'Bongs', price: 40, stock: 20, image: 'fotos/IMG_20260312_235557154_HDR.jpg' },
      { id: 5, name: 'Cuero King Size', category: 'Cueros', price: 3, stock: 200, image: 'fotos/IMG_20260312_235601515_HDR.jpg' },
      { id: 6, name: 'Cuero 1 1/4', category: 'Cueros', price: 2, stock: 250, image: 'fotos/IMG_20260312_235601515_HDR.jpg' },
      { id: 7, name: 'Grinder Metálico', category: 'Grinders', price: 20, stock: 40, image: 'fotos/IMG_20260312_235607237_HDR.jpg' },
      { id: 8, name: 'Grinder Acrílico', category: 'Grinders', price: 10, stock: 60, image: 'fotos/IMG_20260312_235607237_HDR.jpg' },
      { id: 9, name: 'Blон Clásico', category: 'Blons', price: 15, stock: 50, image: 'fotos/IMG_20260312_235623030_HDR.jpg' },
      { id: 10, name: 'Blon Premium', category: 'Blons', price: 25, stock: 30, image: 'fotos/IMG_20260312_235623030_HDR.jpg' },
      { id: 11, name: 'Soplete Recargable', category: 'Sopletes', price: 18, stock: 35, image: 'fotos/IMG_20260312_235626649_HDR.jpg' },
      { id: 12, name: 'Soplete de Mesa', category: 'Sopletes', price: 30, stock: 20, image: 'fotos/IMG_20260312_235626649_HDR.jpg' },
      { id: 13, name: 'Bandeja Metálica', category: 'Bandejas', price: 15, stock: 40, image: 'fotos/IMG_20260312_235632563_HDR.jpg' },
      { id: 14, name: 'Bandeja de Madera', category: 'Bandejas', price: 22, stock: 25, image: 'fotos/IMG_20260312_235632563_HDR.jpg' }
    ];

    function getProducts() {
      var stored = localStorage.getItem('yerba_products');
      if (!stored) {
        localStorage.setItem('yerba_products', JSON.stringify(DEFAULT_PRODUCTS));
        return DEFAULT_PRODUCTS;
      }
      return JSON.parse(stored);
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    var currentFilter = 'Todos';

    // Read category from URL parameter (e.g. ?cat=Glass)
    var urlParams = new URLSearchParams(window.location.search);
    var catParam = urlParams.get('cat');
    if (catParam) {
      currentFilter = catParam;
    }

    function render() {
      var products = getProducts();

      // Build categories
      var categories = ['Todos'];
      products.forEach(function(p) {
        if (categories.indexOf(p.category) === -1) categories.push(p.category);
      });

      // Render filter pills
      var filterBar = document.getElementById('filterBar');
      filterBar.innerHTML = categories.map(function(cat) {
        var activeClass = cat === currentFilter ? ' active' : '';
        return '<button class="filter-pill' + activeClass + '" data-cat="' + escapeHtml(cat) + '">' + escapeHtml(cat) + '</button>';
      }).join('');

      // Filter products
      var filtered = currentFilter === 'Todos' ? products : products.filter(function(p) {
        return p.category === currentFilter;
      });

      // Render grid
      var grid = document.getElementById('inventoryGrid');
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="no-products">No hay productos en esta categoría.</div>';
        return;
      }

      grid.innerHTML = filtered.map(function(p) {
        var imgSrc = p.image || 'fotos/IMG_20260312_235554554_HDR.jpg';
        return '<div class="product-card">' +
          '<div class="img-wrap"><img src="' + escapeHtml(imgSrc) + '" alt="' + escapeHtml(p.name) + '"></div>' +
          '<div class="info">' +
            '<h3>' + escapeHtml(p.name) + '</h3>' +
            '<p class="cat">' + escapeHtml(p.category) + '</p>' +
            '<span class="price">$' + Number(p.price).toFixed(2) + '</span>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    // Delegate click on filter pills
    document.getElementById('filterBar').addEventListener('click', function(e) {
      if (e.target.classList.contains('filter-pill')) {
        currentFilter = e.target.getAttribute('data-cat');
        render();
      }
    });

    render();
  </script>
</body>
</html>
